    <text x="197" y="1035" text-anchor="middle" fill="#ffe47d" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700" letter-spacing="2">FEATURES</text>

    <text x="112" y="1135" font-size="108" font-family="'Brush Script MT', 'Segoe Script', cursive">Stars</text>
    <text x="112" y="1225" font-size="84" font-family="Georgia, serif">shaped in</text>
    <text x="112" y="1338" font-size="118" font-family="'Brush Script MT', 'Segoe Script', cursive">Shared Space</text>

    <text x="125" y="1408" font-size="34" font-family="Inter, Arial, sans-serif">by Kryztelle Ashley Herrera</text>
