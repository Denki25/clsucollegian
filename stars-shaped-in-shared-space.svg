    <path d="M780 210 C900 160, 1010 310, 1095 420" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
    <path d="M760 930 C920 850, 1020 1080, 1110 1220" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
  </g>

  <g>
    <circle cx="200" cy="280" r="96" fill="#f4d1ca"/>
    <path d="M100 248 C138 165, 261 155, 300 250 L300 420 L100 420 Z" fill="#6a284f"/>
    <rect x="145" y="365" width="110" height="165" rx="55" fill="#101010"/>
    <circle cx="940" cy="290" r="88" fill="#f4d1ca"/>
    <path d="M840 250 C865 150, 1018 135, 1040 248 L1040 420 L840 420 Z" fill="#6b1d3a"/>
    <rect x="885" y="360" width="110" height="165" rx="55" fill="#111111"/>
    <circle cx="540" cy="640" r="118" fill="#f0c5bc"/>
    <path d="M414 614 C450 494, 630 494, 666 614 L666 844 L414 844 Z" fill="#c56c7d"/>
    <rect x="456" y="765" width="168" height="220" rx="84" fill="#f6e8de"/>
    <circle cx="930" cy="1010" r="100" fill="#f5cfca"/>
    <path d="M820 968 C855 842, 1002 846, 1038 972 L1038 1166 L820 1166 Z" fill="#f2efef"/>
