    <polygon points="935,115 992,276 1165,276 1025,377 1079,540 935,437 791,540 845,377 705,276 878,276"/>
    <polygon points="540,370 605,551 798,551 642,666 701,852 540,741 379,852 438,666 282,551 475,551"/>
    <polygon points="945,760 1002,921 1175,921 1035,1022 1089,1185 945,1082 801,1185 855,1022 715,921 888,921"/>
    <polygon points="205,815 262,976 435,976 295,1077 349,1240 205,1137 61,1240 115,1077 -25,976 148,976"/>
