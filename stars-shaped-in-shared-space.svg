<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Stars Shaped in Shared Space</title>
  <desc id="desc">Poster-style illustration for the CLSU Collegian feature story Stars Shaped in Shared Space.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8ac"/>
      <stop offset="55%" stop-color="#ffd94d"/>
      <stop offset="100%" stop-color="#fff2a8"/>
    </linearGradient>
    <linearGradient id="flare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#946100" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1200" height="1500" fill="url(#bg)"/>
  <g opacity="0.22">
